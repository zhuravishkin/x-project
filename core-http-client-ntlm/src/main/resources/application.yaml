spring:
  application:
    name: core-http-client-ntlm
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: cep
    locations: classpath:db/migration
x:
  client:
    url: ${EXTERNAL_SERVICE_URL:http://localhost:8080}
    path: ${HTTP_CLIENT_DOMAIN:/process}
    username: ${HTTP_CLIENT_USERNAME}
    password: ${HTTP_CLIENT_PASSWORD}
    connect-timeout-seconds: 30
    read-timeout: 20
  scheduler:
    spca:
      cron: ${SCHEDULER_CRON:30 * * * * *}
